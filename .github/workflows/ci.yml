name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @backups-app/shared build
      - run: pnpm typecheck
      - run: pnpm --filter @backups-app/server build

  docker-server:
    name: Build server Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          tags: backups-app-server:ci
