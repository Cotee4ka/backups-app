name: Release desktop builds

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: dist:win
            artifact: 'release/*.exe'
          - os: macos-latest
            target: dist:mac
            artifact: 'release/*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @backups-app/shared build
      - name: Build desktop app
        working-directory: apps/client-desktop
        run: pnpm ${{ matrix.target }}
        env:
          # Code-signing отключён: секретов нет, и пустые CSC_LINK ломают
          # electron-builder (он трактует пустую строку как путь к файлу).
          # Когда появятся cert'ы — добавить CSC_LINK/CSC_KEY_PASSWORD как
          # secrets и убрать CSC_IDENTITY_AUTO_DISCOVERY.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: backups-app-${{ matrix.os }}
          path: apps/client-desktop/${{ matrix.artifact }}
