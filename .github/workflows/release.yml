name: Release desktop builds

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: dist:win
            artifact: 'release/*.exe'
          - os: macos-latest
            target: dist:mac
            artifact: 'release/*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @backups-app/shared build
      - name: Build desktop app
        working-directory: apps/client-desktop
        run: pnpm ${{ matrix.target }}
        env:
          # code-signing настройки задаются через secrets — заглушки оставлены пустыми
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: backups-app-${{ matrix.os }}
          path: apps/client-desktop/${{ matrix.artifact }}
